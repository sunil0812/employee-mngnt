options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/impactful-arbor-399720/employee-mngnt:$COMMIT_SHA'
      - '.'

  # Step 2: Push the Docker image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/impactful-arbor-399720/employee-mngnt:$COMMIT_SHA']

  # Step 3: Deploy to Google Kubernetes Engine (GKE)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'employee-cluster'  # <-- Replace with actual cluster name
      - '--zone'
      - 'us-central1'  # <-- Replace with actual zone
      - '--project'
      - 'impactful-arbor-399720'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'kubectl'
      - 'set'
      - 'image'
      - 'deployment/employee-mngnt-deployment'  # <-- Replace with actual deployment name
      - 'employee-mngnt=us-central1-docker.pkg.dev/impactful-arbor-399720/employee-mngnt:$COMMIT_SHA'

timeout: '1200s'

images:
  - 'us-central1-docker.pkg.dev/impactful-arbor-399720/gcf-artifacts/employee-mngnt:$COMMIT_SHA'