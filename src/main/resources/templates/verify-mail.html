<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Verification</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 30px;">
<table width="100%" style="max-width: 600px; margin: auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
    <tr>
        <td style="padding: 30px; text-align: center;">
            <h2 style="color: #333333;">Welcome to Employee Portal</h2>
            <p style="color: #555555;">Thank you for registering! Please verify your phone to complete the process.</p>
            <a href="{{verification_link}}" style="display: inline-block; padding: 12px 24px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 16px; margin-top: 20px;">
                Verify Now
            </a>
            <p style="margin-top: 30px; font-size: 13px; color: #999999;">
                This link will expire in 15 minutes.
            </p>
        </td>
    </tr>
</table>
</body>
</html>
